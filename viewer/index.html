<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>рҹӨ– Physical AI көҗмңЎ вҖ” л¬ём„ң</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a1a; --muted: #6b7280; --line: #e5e7eb;
    --side-bg: #f8f9fa; --accent: #059669; --accent-bg: #ecfdf5;
    --code-bg: #f3f4f6; --quote: #7c3aed; --card-bg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d; --fg: #e5e7eb; --muted: #9ca3af; --line: #2d3139;
      --side-bg: #1c1f26; --accent: #34d399; --accent-bg: #14312a;
      --code-bg: #23272f; --quote: #a78bfa; --card-bg: #1c1f26;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
         background: var(--bg); color: var(--fg); display: flex; height: 100vh; overflow: hidden; }

  #side { width: 300px; min-width: 230px; background: var(--side-bg); border-right: 1px solid var(--line);
          display: flex; flex-direction: column; }
  #side.hidden { display: none; }
  #btn-side { font-size: 15px; line-height: 1; padding: 4px 10px; }
  #side header { padding: 12px 14px 8px; }
  #side h1 { font-size: 15px; margin: 0 0 8px; cursor: pointer; }
  #side h1:hover { color: var(--accent); }
  #search { width: 100%; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px;
            background: var(--bg); color: var(--fg); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #tree { flex: 1; overflow-y: auto; padding: 4px 8px 20px; }
  .group { margin-top: 12px; }
  .group > .gtitle { font-size: 11px; font-weight: 800; letter-spacing: .05em; padding: 3px 8px;
                     color: var(--muted); border-bottom: 1px solid var(--line); margin-bottom: 3px; }
  .file { display: block; padding: 5px 8px 5px 14px; border-radius: 7px; cursor: pointer;
          font-size: 13px; line-height: 1.35; color: var(--fg); text-decoration: none;
          overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file:hover { background: var(--accent-bg); }
  .file.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  .file .mt { display: block; font-size: 10.5px; color: var(--muted); font-weight: 400; }
  .file.unread { font-weight: 600; }
  .badge { display: inline-block; font-size: 9.5px; font-weight: 800; border-radius: 5px;
           padding: 1px 5px; margin-right: 6px; vertical-align: 1px; }
  .badge-new { background: #16a34a; color: #fff; }
  .badge-upd { background: #d97706; color: #fff; }
  .unread-box { border: 1px solid var(--accent); border-radius: 10px; padding: 4px 4px 8px; margin: 10px 2px 4px;
                background: var(--accent-bg); }
  .unread-box > .gtitle { color: var(--accent); display: flex; align-items: center; justify-content: space-between;
                          font-size: 12px; border: none; }
  .mark-all { border: 1px solid var(--accent); background: transparent; color: var(--accent);
              border-radius: 6px; font-size: 10px; padding: 2px 7px; cursor: pointer; }
  .mark-all:hover { background: var(--accent); color: #fff; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar { display: flex; align-items: center; gap: 10px; padding: 10px 22px;
            border-bottom: 1px solid var(--line); font-size: 13px; color: var(--muted); }
  #topbar .path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #topbar button { border: 1px solid var(--line); background: var(--bg); color: var(--fg);
                   border-radius: 7px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  #topbar button:hover { border-color: var(--accent); color: var(--accent); }
  #content { flex: 1; overflow-y: auto; padding: 26px 36px 80px; }
  #doc { max-width: 880px; margin: 0 auto; line-height: 1.75; font-size: 15.5px; }

  #doc h1 { font-size: 26px; border-bottom: 2px solid var(--line); padding-bottom: 8px; }
  #doc h2 { font-size: 21px; margin-top: 2em; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  #doc h3 { font-size: 17px; margin-top: 1.6em; }
  #doc a { color: var(--accent); }
  #doc blockquote { margin: 1em 0; padding: 8px 16px; border-left: 4px solid var(--quote);
                    background: var(--code-bg); border-radius: 0 8px 8px 0; }
  #doc blockquote p { margin: 6px 0; }
  #doc code { background: var(--code-bg); padding: 2px 6px; border-radius: 5px; font-size: 13.5px; }
  #doc pre { background: var(--code-bg); padding: 14px 16px; border-radius: 10px; overflow-x: auto; }
  #doc pre code { background: none; padding: 0; }
  #doc table { border-collapse: collapse; margin: 1em 0; width: 100%; display: block; overflow-x: auto; font-size: 14px; }
  #doc th, #doc td { border: 1px solid var(--line); padding: 7px 11px; text-align: left; vertical-align: top; }
  #doc th { background: var(--code-bg); }
  #doc hr { border: none; border-top: 1px solid var(--line); margin: 2.2em 0; }
  #doc li { margin: 4px 0; }
  #doc .txt-plain { white-space: pre-wrap; font-size: 14px; line-height: 1.7; }

  /* м—җл””н„° */
  #editor { display: none; max-width: 880px; margin: 0 auto; width: 100%; }
  #editor textarea { width: 100%; min-height: 60vh; resize: vertical; padding: 16px 18px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--code-bg); color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13.5px; line-height: 1.65; outline: none; }
  #editor textarea:focus { border-color: var(--accent); }
  #editor .ebar { display: flex; gap: 8px; align-items: center; margin: 10px 2px; }
  #editor .ebar .hint { color: var(--muted); font-size: 12px; margin-left: auto; }
  #editor button.save { background: var(--accent); color: #fff; border: none; border-radius: 7px;
    padding: 6px 16px; font-size: 13px; cursor: pointer; }
  #editor button.cancel { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    border-radius: 7px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  #topbar button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  #topbar button:disabled { opacity: .4; cursor: default; }
  #topbar button.on:hover { color: #fff; }

  /* ліҖкІҪ мӨ„ н•ҳмқҙлқјмқҙнҠё */
  .chg-line { display: block; background: var(--accent-bg); border-left: 3px solid var(--accent);
    padding: 0 8px; margin: 0 -8px; }
  #doc .chg-mark { background: var(--accent-bg); box-shadow: 0 0 0 2px var(--accent-bg); border-radius: 3px; }

  /* нҷҲ */
  #home { max-width: 1000px; margin: 0 auto; }
  #home h2.htitle { font-size: 20px; margin: 4px 0 2px; border: none; }
  #home .hsub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .node { border: 1.5px solid var(--accent); border-radius: 14px; background: var(--card-bg); padding: 12px 14px; }
  .node .ntitle { font-size: 13.5px; font-weight: 700; display: flex; justify-content: space-between; gap: 6px; }
  .node .ndesc { font-size: 11.5px; color: var(--muted); margin: 3px 0 8px; }
  .node .count { font-size: 10.5px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .node .count .u { color: #16a34a; font-weight: 800; }
</style>
</head>
<body>
<nav id="side">
  <header>
    <h1 onclick="goHome()">рҹӨ– Physical AI көҗмңЎ</h1>
    <input id="search" type="search" placeholder="нҢҢмқјлӘ… кІҖмғүвҖҰ">
  </header>
  <div id="tree"></div>
</nav>
<div id="main">
  <div id="topbar">
    <button id="btn-side" onclick="toggleSide()" title="мӮ¬мқҙл“ңл°” м ‘кё°/нҺҙкё° (вҢҳ/Ctrl+B)">вҳ°</button>
    <button onclick="goHome()">рҹҸ  нҷҲ</button>
    <span class="path" id="curpath"></span>
    <span id="curtime"></span>
    <button id="btn-diff" onclick="toggleDiff()" disabled title="мқҙ л¬ём„ңм—җм„ң л§Ҳм§Җл§үмңјлЎң ліё л’Ө л°”лҖҗ мӨ„мқ„ н‘ңмӢң">рҹ”Ҷ ліҖкІҪ</button>
    <button id="btn-edit" onclick="startEdit()" disabled>вңҸпёҸ нҺём§‘</button>
    <button onclick="loadTree()">мғҲлЎңкі м№Ё</button>
  </div>
  <div id="content"><div id="doc"></div><div id="editor"></div></div>
</div>

<script>
/* к·ёлЈ№: мөңмғҒмң„ нҸҙлҚ” мһҗлҸҷ (referenceлҠ” 2лӢЁкі„). мғҲ нҸҙлҚ”к°Җ мғқкё°л©ҙ мһҗлҸҷмңјлЎң лӮҳнғҖлӮңлӢӨ. */
const GROUP_ORDER = ['лЈЁнҠё', 'docs', 'lab', 'private'];
const DESCS = {
  'лЈЁнҠё': 'README В· н”„лЎңм қнҠё к°ңмҡ”',
  'docs': 'кіөк°ң л¬ём„ң вҖ” м ңн’Ҳ м»Ём…ү В· мӢңмһҘ мҠӨмә” В· нҸ¬м§Җм…”лӢқ',
  'lab': 'Physical AI мӢӨмҠө вҖ” мӢңл®¬л Ҳмқҙм…ҳ нҠңнҶ лҰ¬м–ј В· л ҲнҚјлҹ°мҠӨ',
  'private': 'л№„кіөк°ң мһ‘м—… нҸҙлҚ” (GitHub лҜёкіөк°ң)',
};
function groupKey(p) {
  const parts = p.split('/');
  if (parts.length === 1) return 'лЈЁнҠё';
  return parts[0];
}
function groupRank(g) {
  const i = GROUP_ORDER.indexOf(g);
  return i === -1 ? GROUP_ORDER.length : i;
}

let allFiles = [], current = null, currentMtime = 0;
let currentContent = '', changedLines = new Set(), diffMode = false, editing = false;
let seen = {};
try { seen = JSON.parse(localStorage.getItem('paiedu-seen') || '{}'); } catch (e) {}
function saveSeen() { localStorage.setItem('paiedu-seen', JSON.stringify(seen)); }
// snap[path] = л§Ҳм§Җл§үмңјлЎң л·°м–ҙк°Җ л ҢлҚ”н•ң лӮҙмҡ©. лӢӨмқҢ м—ҙлһҢ л•Ң мқҙкІғкіј л№„көҗн•ҙ л°”лҖҗ мӨ„мқ„ м°ҫлҠ”лӢӨ.
let snap = {};
try { snap = JSON.parse(localStorage.getItem('paiedu-snap') || '{}'); } catch (e) {}
function saveSnap() { try { localStorage.setItem('paiedu-snap', JSON.stringify(snap)); } catch (e) {} }

// oldText вҶ’ newText лЎң л°”лҖҢл©ҙм„ң "мғҲлЎң мғқкё°кұ°лӮҳ лӮҙмҡ©мқҙ лӢ¬лқјм§„ мӨ„"мқҳ мқёлҚұмҠӨ(newText кё°мӨҖ)лҘј л°ҳнҷҳ.
// л°ҳнҷҳ: Set<number> (newText.split('\n') мқҳ мқёлҚұмҠӨ). ліҖкІҪ м—Ҷмңјл©ҙ л№Ҳ Set.
function changedLineSet(oldText, newText) {
  const oldSet = new Set(oldText.split('\n'));
  const changed = new Set();
  newText.split('\n').forEach((line, i) => {
    // л№Ҳ мӨ„мқҖ л¬ҙмӢңн•ҳкі , мқҙм „ н…ҚмҠӨнҠём—җ м—ҶлҚҳ мҷ„м „нһҲ мғҲлЎңмҡҙ мӨ„л§Ң ліҖкІҪлҗң кІғмңјлЎң нҢҗм •
    if (line.trim() !== '' && !oldSet.has(line)) {
      changed.add(i);
    }
  });
  return changed;
}
function unreadState(f) {
  if (!(f.path in seen)) return 'new';
  if (f.mtime > seen[f.path] + 1) return 'upd';
  return null;
}
function pad(n) { return String(n).padStart(2, '0'); }
function fmtTime(t) {
  const d = new Date(t * 1000), now = new Date();
  const hm = pad(d.getHours()) + ':' + pad(d.getMinutes());
  if (d.toDateString() === now.toDateString()) return 'мҳӨлҠҳ ' + hm;
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hm;
}

function fileLink(f, showPath) {
  const st = unreadState(f);
  const badge = st === 'new' ? '<span class="badge badge-new">NEW</span>'
              : st === 'upd' ? '<span class="badge badge-upd">мҲҳм •лҗЁ</span>' : '';
  const a = document.createElement('a');
  a.className = 'file' + (current === f.path ? ' active' : '') + (st ? ' unread' : '');
  a.title = f.path;
  const dir = f.path.split('/').slice(0, -1).join('/');
  a.innerHTML = `${badge}${f.name.replace(/\.(md|txt)$/i, '')}` +
    `<span class="mt">${showPath && dir ? dir + ' В· ' : ''}${fmtTime(f.mtime)}</span>`;
  a.onclick = () => openFile(f.path);
  return a;
}

function renderTree(filter) {
  const tree = document.getElementById('tree');
  let files = allFiles;
  if (filter) files = files.filter(f => f.path.toLowerCase().includes(filter.toLowerCase()));
  tree.innerHTML = '';

  const unread = files.filter(f => unreadState(f)).sort((a, b) => b.mtime - a.mtime);
  if (unread.length) {
    const div = document.createElement('div');
    div.className = 'group unread-box';
    div.innerHTML = `<div class="gtitle">рҹҶ• м•Ҳ ліё л¬ём„ң (${unread.length})` +
      `<button class="mark-all">лӘЁл‘җ мқҪмқҢ</button></div>`;
    div.querySelector('.mark-all').onclick = (e) => {
      e.stopPropagation();
      for (const f of allFiles) seen[f.path] = f.mtime;
      saveSeen(); renderTree(filter); if (!current) goHome();
    };
    for (const f of unread.slice(0, 15)) div.appendChild(fileLink(f, true));
    tree.appendChild(div);
  }

  const groups = {};
  for (const f of files) (groups[groupKey(f.path)] ||= []).push(f);
  const keys = Object.keys(groups).sort((a, b) => groupRank(a) - groupRank(b) || a.localeCompare(b));
  for (const g of keys) {
    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `<div class="gtitle">${g}</div>`;
    groups[g].sort((a, b) => b.mtime - a.mtime);
    for (const f of groups[g]) div.appendChild(fileLink(f, false));
    tree.appendChild(div);
  }
}

function goHome() {
  current = null; location.hash = ''; editing = false; diffMode = false;
  document.getElementById('curpath').textContent = 'Physical AI көҗмңЎ н”Ңлһ«нҸј вҖ” л¬ём„ң нҷҲ';
  document.getElementById('curtime').textContent = '';
  document.getElementById('btn-edit').disabled = true;
  const db = document.getElementById('btn-diff'); db.disabled = true; db.classList.remove('on');
  document.getElementById('editor').style.display = 'none';
  const doc = document.getElementById('doc');
  doc.style.display = ''; doc.innerHTML = '';
  const home = document.createElement('div');
  home.id = 'home';
  home.innerHTML = `<h2 class="htitle">рҹӨ– Physical AI көҗмңЎ н”Ңлһ«нҸј</h2>` +
    `<div class="hsub">"лӮҳлҘј нҶ лӢҘм—¬мӨҳ" вҶ’ "л¬ҙк¶Ғнҷ”кҪғмқҙ н”јм—ҲмҠөлӢҲлӢӨ" вҖ” 42мӢқ н”јм–ҙ лҰ¬л·° physical AI н•ҷкөҗ. м№ҙл“ңмқҳ нҢҢмқјмқ„ л°”лЎң нҒҙлҰӯн•ҙ м—ҙ мҲҳ мһҲлӢӨ.</div>`;
  const cards = document.createElement('div');
  cards.className = 'cards';
  const groups = {};
  for (const f of allFiles) (groups[groupKey(f.path)] ||= []).push(f);
  const keys = Object.keys(groups).sort((a, b) => groupRank(a) - groupRank(b) || a.localeCompare(b));
  for (const g of keys) {
    const files = groups[g].sort((a, b) => b.mtime - a.mtime);
    const un = files.filter(f => unreadState(f)).length;
    const div = document.createElement('div');
    div.className = 'node';
    div.innerHTML =
      `<div class="ntitle"><span>${g}</span>` +
      `<span class="count">${files.length}к°ң${un ? ` В· <span class="u">NEW ${un}</span>` : ''}</span></div>` +
      `<div class="ndesc">${DESCS[g] || ''}</div>`;
    for (const f of files.slice(0, 5)) div.appendChild(fileLink(f, false));
    cards.appendChild(div);
  }
  home.appendChild(cards);
  doc.appendChild(home);
  renderTree(document.getElementById('search').value.trim());
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// нҳ„мһ¬ нҢҢмқјмқ„ diffMode к°’м—җ л”°лқј л ҢлҚ”. diffModeл©ҙ raw + л°”лҖҗ мӨ„ н•ҳмқҙлқјмқҙнҠё, м•„лӢҲл©ҙ л§ҲнҒ¬лӢӨмҡҙ.
function renderCurrent(keepScroll) {
  const doc = document.getElementById('doc');
  const scroll = keepScroll ? document.getElementById('content').scrollTop : 0;
  if (diffMode) {
    const html = currentContent.split('\n')
      .map((ln, i) => changedLines.has(i)
        ? `<span class="chg-line">${esc(ln) || ' '}</span>`
        : esc(ln) || ' ')
      .join('\n');
    doc.innerHTML = `<div class="txt-plain">${html}</div>`;
  } else if (current && current.toLowerCase().endsWith('.md') && window.marked) {
    doc.innerHTML = marked.parse(currentContent, { gfm: true, breaks: true });
  } else {
    doc.innerHTML = '';
    const pre = document.createElement('div');
    pre.className = 'txt-plain';
    pre.textContent = currentContent;
    doc.appendChild(pre);
  }
  document.getElementById('content').scrollTop = scroll;
}

function applyContent(path, data) {
  const prev = snap[path];
  changedLines = (prev != null && prev !== data.content)
    ? (changedLineSet(prev, data.content) || new Set())
    : new Set();
  currentContent = data.content;
  snap[path] = data.content; saveSnap();
  const diffBtn = document.getElementById('btn-diff');
  diffBtn.disabled = changedLines.size === 0;
  document.getElementById('btn-edit').disabled = false;
}

async function openFile(path, keepScroll) {
  const res = await fetch('/api/file?path=' + encodeURIComponent(path));
  if (!res.ok) return;
  const data = await res.json();
  current = path; currentMtime = data.mtime;
  seen[path] = data.mtime; saveSeen();
  location.hash = encodeURIComponent(path);
  document.getElementById('curpath').textContent = path;
  document.getElementById('curtime').textContent = 'мҲҳм •: ' + fmtTime(data.mtime);
  applyContent(path, data);
  // ліҙлҚҳ мӨ‘ нҢҢмқјмқҙ л°”лҖҢм–ҙ(keepScroll) мӢӨм ң ліҖкІҪ мӨ„мқҙ мһҲмңјл©ҙ мһҗлҸҷмңјлЎң н•ҳмқҙлқјмқҙнҠёлҘј мј лӢӨ.
  diffMode = !!(keepScroll && changedLines.size);
  document.getElementById('btn-diff').classList.toggle('on', diffMode);
  document.getElementById('doc').style.display = '';
  document.getElementById('editor').style.display = 'none';
  editing = false;
  renderCurrent(keepScroll);
  renderTree(document.getElementById('search').value.trim());
}

function toggleDiff() {
  if (document.getElementById('btn-diff').disabled) return;
  diffMode = !diffMode;
  document.getElementById('btn-diff').classList.toggle('on', diffMode);
  renderCurrent(true);
}

function startEdit() {
  if (!current) return;
  editing = true; diffMode = false;
  document.getElementById('btn-diff').classList.remove('on');
  document.getElementById('doc').style.display = 'none';
  const ed = document.getElementById('editor');
  ed.style.display = 'block';
  ed.innerHTML = '';
  const ta = document.createElement('textarea');
  ta.value = currentContent;
  ta.spellcheck = false;
  const bar = document.createElement('div');
  bar.className = 'ebar';
  bar.innerHTML = '<button class="save">рҹ’ҫ м ҖмһҘ</button>' +
    '<button class="cancel">м·ЁмҶҢ</button>' +
    '<span class="hint">вҢҳ/Ctrl+S м ҖмһҘ В· Esc м·ЁмҶҢ</span>';
  ed.appendChild(bar); ed.appendChild(ta);
  bar.querySelector('.save').onclick = () => saveEdit(ta.value);
  bar.querySelector('.cancel').onclick = cancelEdit;
  ta.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveEdit(ta.value); }
    else if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  });
  ta.focus();
}

async function saveEdit(text) {
  const path = current;
  const res = await fetch('/api/save', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, content: text })
  });
  if (!res.ok) { alert('м ҖмһҘ мӢӨнҢЁ'); return; }
  const data = await res.json();
  currentMtime = data.mtime;
  // м ҖмһҘ м§Ғм „ лӮҙмҡ©мқ„ snap кё°мӨҖмңјлЎң мӮјм•„, лӮҙк°Җ л°©кёҲ л°”кҫј мӨ„мқ„ н•ҳмқҙлқјмқҙнҠёлЎң ліҙм—¬мӨҖлӢӨ.
  const before = snap[path];
  changedLines = (before != null && before !== data.content)
    ? (changedLineSet(before, data.content) || new Set())
    : new Set();
  currentContent = data.content; snap[path] = data.content; saveSnap();
  editing = false;
  document.getElementById('editor').style.display = 'none';
  document.getElementById('doc').style.display = '';
  const diffBtn = document.getElementById('btn-diff');
  diffBtn.disabled = changedLines.size === 0;
  diffMode = changedLines.size > 0;
  diffBtn.classList.toggle('on', diffMode);
  document.getElementById('curtime').textContent = 'мҲҳм •: ' + fmtTime(data.mtime);
  renderCurrent(false);
}

function cancelEdit() {
  editing = false;
  document.getElementById('editor').style.display = 'none';
  document.getElementById('doc').style.display = '';
  renderCurrent(false);
}

async function loadTree() {
  const res = await fetch('/api/tree');
  allFiles = await res.json();
  if (current) renderTree(document.getElementById('search').value.trim());
  else goHome();
}

setInterval(async () => {
  if (!current || editing) return;
  try {
    const res = await fetch('/api/file?path=' + encodeURIComponent(current));
    const data = await res.json();
    if (data.mtime && data.mtime !== currentMtime) openFile(current, true);
  } catch (e) {}
}, 3000);
setInterval(loadTree, 10000);

document.getElementById('search').addEventListener('input', e => renderTree(e.target.value.trim()));

function toggleSide(force) {
  const side = document.getElementById('side');
  const hide = force === undefined ? !side.classList.contains('hidden') : force;
  side.classList.toggle('hidden', hide);
  document.getElementById('btn-side').classList.toggle('on', hide);
  localStorage.setItem('paiedu-side-hidden', hide ? '1' : '');
}
// м ҖмһҘлҗң мғҒнғң ліөмӣҗ + вҢҳ/Ctrl+B лӢЁм¶•нӮӨ (нҺём§‘ мӨ‘м—” л¬ҙмӢң)
toggleSide(localStorage.getItem('paiedu-side-hidden') === '1');
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'b' && !editing) {
    e.preventDefault(); toggleSide();
  }
});

loadTree().then(() => {
  const h = decodeURIComponent(location.hash.slice(1));
  if (h) openFile(h);
});
</script>
</body>
</html>
